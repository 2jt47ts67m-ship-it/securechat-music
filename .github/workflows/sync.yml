name: Sync YouTube Playlist to GitHub CDN

on:
  workflow_dispatch: # Allow manual triggers
  schedule:
    - cron: '0 0 * * *' # Run daily to auto-sync!

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yt-dlp

      - name: Run Sync Script
        env:
          MUSIC_DIR: .
          GITHUB_REPOSITORY: ${{ github.repository }}
          YOUTUBE_PLAYLIST_URL: https://music.youtube.com/playlist?list=PLL6jXrekrHSA&si=J_43HFcG6yQsUomm
        run: python sync.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Sync playlist: $(date)" || echo "No changes to commit"
          git push origin main
